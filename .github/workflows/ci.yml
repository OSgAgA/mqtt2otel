name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test --logger "trx;LogFileName=TestResults.trx"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: mqtt2otel.Tests/TestResults/TestResults.trx
          reporter: dotnet-trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/TestResults.trx

      - name: Publish
        run: dotnet publish ./mqtt2otel.Server/mqtt2otel.Server.csproj -c Release --no-build --output ./app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./app