name: CI

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --packages .nuget/packages

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test --logger "trx;LogFileName=TestResults.trx"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: mqtt2otel.Tests/TestResults/TestResults.trx
          reporter: dotnet-trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: mqtt2otel.Tests/TestResults/TestResults.trx

      - name: Publish
        run: dotnet publish ./mqtt2otel.Server/mqtt2otel.Server.csproj -c Release --no-restore --output ./app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./app

  docker:
    name: Build & Push Docker (multi-arch)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: mqtt2otel/Deployment/app

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version (label or git tag)
        id: version
        run: |
          # Get PR labels
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name')

          VERSION=""
          for label in $LABELS; do
            if [[ "$label" == version:* ]]; then
              VERSION="${label#version:}"
            fi
          done

          # Fetch all tags
          git fetch --tags

          if [[ -n "$VERSION" ]]; then
            echo "Using version from label: $VERSION"
          else
            echo "No version label found. Using latest git tag..."

            # Get latest semver tag
            LATEST=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)

            if [[ -z "$LATEST" ]]; then
              echo "No tags found. Starting at 0.1.0"
              VERSION="0.1.0"
            else
              echo "Latest tag: $LATEST"

              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
              PATCH=$((PATCH + 1))

              VERSION="$MAJOR.$MINOR.$PATCH"
            fi

            echo "Auto-generated version: $VERSION"
          fi

          # Validate version format
          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "❌ ERROR: Invalid version format: $VERSION"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=50

      - name: Generate changelog
        id: changelog
        run: |
          echo "### Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**PR Title:** ${{ github.event.pull_request.title }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**PR Description:**" >> CHANGELOG.md
          echo "${{ github.event.pull_request.body }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Commits:**" >> CHANGELOG.md

          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100
          git log --pretty=format:"- %s" origin/${{ github.event.pull_request.base.ref }}..HEAD >> CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

      - name: Write version file
        run: |
          echo "${{ steps.version.outputs.version }}" > mqtt2otel/Deployment/app/version.txt

      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: mqtt2otel/Deployment
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            osgaga/mqtt2otel:${{ steps.version.outputs.version }}
            osgaga/mqtt2otel:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            osgaga/mqtt2otel:${{ steps.version.outputs.major }}
            osgaga/mqtt2otel:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.description=Built from PR #${{ github.event.pull_request.number }}
            org.opencontainers.image.changelog=${{ steps.changelog.outputs.changelog }}
          cache-from: type=registry,ref=osgaga/mqtt2otel:cache
          cache-to: type=registry,ref=osgaga/mqtt2otel:cache,mode=max

      - name: Create and push git tag
        if: github.event.pull_request.merged == true
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}