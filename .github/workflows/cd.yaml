name: Deployment

permissions:
  contents: write
  checks: write
  pull-requests: write

on:
  push:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --packages .nuget/packages

      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror

      - name: Publish
        run: dotnet publish ./mqtt2otel.Server/mqtt2otel.Server.csproj -c Release --no-restore --output ./app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./app

  docker:
    name: Build & Push Docker (multi-arch)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: mqtt2otel/Deployment/app

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract PR number (safe)
        id: pr
        run: |
            PR_NUMBER=$(echo "${{ github.event.head_commit.message }}" | grep -oE '#[0-9]+' | tr -d '#' || true)
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Fetch PR labels
        id: pr_labels
        if: steps.pr.outputs.pr_number != ''
        run: |
            PR_NUMBER=${{ steps.pr.outputs.pr_number }}

            LABELS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/labels \
              | jq -r '.[].name')

            VERSION=""
            for label in $LABELS; do
              if [[ "$label" == version:* ]]; then
                VERSION="${label#version:}"
              fi
            done

            echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
            VERSION="${{ steps.pr_labels.outputs.version }}"

            if [[ -z "$VERSION" ]]; then
              LATEST=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)

              if [[ -z "$LATEST" ]]; then
                VERSION="0.1.0"
              else
                IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
                PATCH=$((PATCH + 1))
                VERSION="$MAJOR.$MINOR.$PATCH"
              fi
            fi

            echo "version=$VERSION" >> $GITHUB_OUTPUT

            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Invalid version format: $VERSION"
              exit 1
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
            echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Write version file
        run: |
          echo "${{ steps.version.outputs.version }}" > mqtt2otel/Deployment/app/version.txt

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: mqtt2otel/Deployment/app/version.txt

      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: mqtt2otel/Deployment
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            osgaga/mqtt2otel:${{ steps.version.outputs.version }}
            osgaga/mqtt2otel:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            osgaga/mqtt2otel:${{ steps.version.outputs.major }}
            osgaga/mqtt2otel:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=osgaga/mqtt2otel:cache
          cache-to: type=registry,ref=osgaga/mqtt2otel:cache,mode=max

      - name: Create and push git tag
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
              echo "Tag already exists, skipping"
            else
              git tag ${{ steps.version.outputs.version }}
              git push origin ${{ steps.version.outputs.version }}
            fi

  deploy-docs:
    name: Deploy Hugo Docs
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
  
      - name: Build Hugo site
        working-directory: ./docs
        run: hugo --minify
  
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public
  
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4